# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Sunnah Remedies — Tracking Plan v1.0
# Single source of truth for event taxonomy
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

version: "1.0"
last_reviewed: "2026-07-04"
governance:
  changes_require_pr: true
  quarterly_review: true
  pii_prohibited: true

# ── Custom Dimensions (registered in GA4) ──────────────
custom_dimensions:
  - name: pillar
    scope: event
    values: [apothecary, academy, journeys, knowledge, clinical, institute]

  - name: content_type
    scope: event
    values: [article, product, course, entity, consultation, journey, video, faq]

  - name: entity_type
    scope: event
    values: [disease, herb, product, hadith, verse, ingredient, faculty]

  - name: hadith_grade
    scope: event
    values: [sahih, hasan, daif]

  - name: content_freshness
    scope: event
    values: [fresh, due_review, stale]

  - name: ai_confidence_band
    scope: event
    values: [high, medium, low]

  - name: funnel_stage
    scope: event
    values: [threshold, corridor, pathway]

  - name: user_segment
    scope: user
    values: [visitor, patient, student, researcher, customer]

  - name: student_status
    scope: user
    values: [prospect, applicant, enrolled, graduate]

  - name: consent_state
    scope: user
    values: [granted, denied, modelled]

# ── Custom Metrics ─────────────────────────────────────
custom_metrics:
  - reading_seconds
  - scroll_pct
  - video_pct
  - quiz_score
  - ai_confidence
  - citation_count
  - search_refinements

# ── User Properties ────────────────────────────────────
user_properties:
  - user_segment
  - student_status
  - preferred_language
  - first_pillar_touched
  - lifecycle_stage

# ── Event Catalogue ────────────────────────────────────

events:
  # ─── Editorial / Knowledge Library ───────────────────
  - event_name: article_view
    trigger: User lands on an article page
    surface: knowledge-library/[slug]
    source: client
    parameters:
      - { name: article_id, type: string }
      - { name: article_title, type: string }
      - { name: pillar, type: string }
      - { name: content_type, type: string, value: article }
      - { name: content_freshness, type: string }
    ledger: integrity
    key_event: false
    decision_served: Which articles attract readership
    owner: editorial
    consent_category: analytics
    pii_risk: none

  - event_name: article_read_25
    trigger: User scrolls past 25% of article
    surface: knowledge-library/[slug]
    source: client
    parameters:
      - { name: article_id, type: string }
      - { name: scroll_pct, type: number, value: 25 }
      - { name: reading_seconds, type: number }
    ledger: integrity
    key_event: false
    decision_served: Reading depth analysis
    owner: editorial
    consent_category: analytics
    pii_risk: none

